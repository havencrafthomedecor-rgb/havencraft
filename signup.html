<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sign Up - HavenCraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#b48a1e,#8f6b32);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#fff;
width:400px;
padding:30px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.tabs{
display:flex;
margin-bottom:20px;
border-bottom:2px solid #eee;
}

.tab{
flex:1;
text-align:center;
padding:10px;
cursor:pointer;
font-weight:bold;
color:#777;
}

.tab.active{
color:#b48a1e;
border-bottom:3px solid #b48a1e;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

.phone-box{
display:flex;
align-items:center;
margin:10px 0;
}

.prefix{
background:#f2f2f2;
width:65px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #ccc;
border-right:none;
border-radius:6px 0 0 6px;
font-weight:600;
}

.phone-box input{
height:45px;
flex:1;
padding:0 12px;
border:1px solid #ccc;
border-left:none;
border-radius:0 6px 6px 0;
}

button{
width:100%;
padding:12px;
background:#b48a1e;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#8f6b32;
}

#phoneSignup,#otpSection{
display:none;
}

</style>

</head>
<body>

<div class="card">

<div class="tabs">
<div class="tab active" onclick="showEmail()">Email</div>
<div class="tab" onclick="showPhone()">Phone</div>
</div>

<!-- EMAIL SIGNUP -->
<div id="emailSignup">

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Create Password">

<input type="password" id="confirmPassword" placeholder="Confirm Password">

<button onclick="signupEmail()">Create Account</button>

</div>

<!-- PHONE SIGNUP -->

<div id="phoneSignup">

<div class="phone-box">
<div class="prefix">+880</div>
<input type="text" id="phone" placeholder="1XXXXXXXXX">
</div>

<button onclick="sendOTP()">Send OTP</button>

<div id="otpSection">

<input type="text" id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify & Create Account</button>

</div>

<div id="recaptcha-container"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithPhoneNumber,
RecaptchaVerifier
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyAlstADR1Yap2DFXz_PkkQNU7YVCHcRqcE",
authDomain: "havencraft-a3da4.firebaseapp.com",
projectId: "havencraft-a3da4",
storageBucket: "havencraft-a3da4.firebasestorage.app",
messagingSenderId: "304831975727",
appId: "1:304831975727:web:952d981f71f2c721d511da"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.showEmail=function(){
document.getElementById("emailSignup").style.display="block";
document.getElementById("phoneSignup").style.display="none";
document.querySelectorAll(".tab")[0].classList.add("active");
document.querySelectorAll(".tab")[1].classList.remove("active");
}

window.showPhone=function(){
document.getElementById("emailSignup").style.display="none";
document.getElementById("phoneSignup").style.display="block";
document.querySelectorAll(".tab")[1].classList.add("active");
document.querySelectorAll(".tab")[0].classList.remove("active");
}

window.signupEmail=function(){

const email=document.getElementById("email").value;
const pass=document.getElementById("password").value;
const confirm=document.getElementById("confirmPassword").value;

if(pass!==confirm){
alert("Passwords do not match ❌");
return;
}

createUserWithEmailAndPassword(auth,email,pass)
.then(()=>{
alert("Account Created ✅");
window.location.href="login.html";
})
.catch(e=>alert(e.message));

}

// Recaptcha

window.recaptchaVerifier=new RecaptchaVerifier(auth,'recaptcha-container',{
size:'normal'
});

// Send OTP

window.sendOTP=function(){

const phone="+880"+document.getElementById("phone").value;

signInWithPhoneNumber(auth,phone,window.recaptchaVerifier)
.then(result=>{
window.confirmationResult=result;
document.getElementById("otpSection").style.display="block";
})
.catch(e=>alert(e.message));

}

// Verify OTP

window.verifyOTP=function(){

const otp=document.getElementById("otp").value;

confirmationResult.confirm(otp)
.then(()=>{
alert("Phone Signup Successful ✅");
window.location.href="login.html";
})
.catch(()=>alert("Invalid OTP"));

}

</script>

</body>
</html>
