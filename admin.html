<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HavenCraft Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:#f4f4f4;
}

/* LOGIN PAGE */

.login-page{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:#fff;
    padding:40px;
    border-radius:15px;
    width:350px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

.login-box h2{
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

.login-box button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:25px;
    background:#c6a86b;
    color:#fff;
    cursor:pointer;
}

/* DASHBOARD */

.dashboard{
    display:none;
    padding:40px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:30px;
}

.logout-btn{
    background:#e74c3c;
    border:none;
    padding:8px 15px;
    border-radius:20px;
    color:#fff;
    cursor:pointer;
}

.form-box{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    margin-bottom:40px;
}

.form-box input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

.form-box button{
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background:#c6a86b;
    color:#fff;
    cursor:pointer;
}

.product-list{
    background:#fff;
    padding:20px;
    border-radius:15px;
}

.product-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.delete-btn{
    background:#e74c3c;
    border:none;
    padding:5px 10px;
    border-radius:15px;
    color:#fff;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN SECTION -->

<div class="login-page" id="loginPage">
    <div class="login-box">
        <h2>Admin Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- DASHBOARD -->

<div class="dashboard" id="dashboard">

    <div class="topbar">
        <h2>HavenCraft Admin Panel</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="form-box">
        <h3>Add New Product</h3>
        <input type="text" id="pname" placeholder="Product Name">
        <input type="number" id="pprice" placeholder="Price">
        <input type="text" id="pimage" placeholder="Image URL">
        <button onclick="addProduct()">Add Product</button>
    </div>

    <div class="product-list" id="productList">
        <h3>All Products</h3>
    </div>

</div>

<script>

/* ================= LOGIN SYSTEM ================= */

const ADMIN_USER = "havencraft.homedecor";
const ADMIN_PASS = "NrEm32bD";

function login(){

    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if(u === ADMIN_USER && p === ADMIN_PASS){
        localStorage.setItem("havencraft_admin","true");
        showDashboard();
    }else{
        alert("Invalid Login");
    }
}

function logout(){
    localStorage.removeItem("havencraft_admin");
    location.reload();
}

function showDashboard(){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("dashboard").style.display="block";
    loadProducts();
}

if(localStorage.getItem("havencraft_admin")){
    showDashboard();
}

/* ================= PRODUCT SYSTEM ================= */

let products = JSON.parse(localStorage.getItem("havencraft_products")) || [];

function saveProducts(){
    localStorage.setItem("havencraft_products", JSON.stringify(products));
}

function addProduct(){

    let name = document.getElementById("pname").value;
    let price = document.getElementById("pprice").value;
    let image = document.getElementById("pimage").value;

    if(!name || !price || !image){
        alert("Fill all fields");
        return;
    }

    products.push({
        name,
        price,
        image
    });

    saveProducts();
    loadProducts();

    document.getElementById("pname").value="";
    document.getElementById("pprice").value="";
    document.getElementById("pimage").value="";
}

function loadProducts(){

    let container = document.getElementById("productList");
    container.innerHTML="<h3>All Products</h3>";

    products.forEach((p,index)=>{
        let div = document.createElement("div");
        div.className="product-item";
        div.innerHTML=`
            <span>${p.name} - ${p.price}৳</span>
            <button class="delete-btn" onclick="deleteProduct(${index})">Delete</button>
        `;
        container.appendChild(div);
    });
}

function deleteProduct(index){
    products.splice(index,1);
    saveProducts();
    loadProducts();
}

</script>

</body>
</html>
