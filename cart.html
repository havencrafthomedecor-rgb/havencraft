<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HavenCraft | Shopping Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* ================= CART PAGE EXTRA DESIGN ================= */

.cart-page{
    padding:120px 8% 80px;
    min-height:100vh;
}

.cart-container{
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:50px;
}

.cart-item{
    background:#fff;
    padding:25px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.cart-info h3{
    margin-bottom:5px;
}

.cart-qty{
    display:flex;
    align-items:center;
    gap:10px;
}

.cart-qty button{
    background:#c6a86b;
    border:none;
    color:#fff;
    width:30px;
    height:30px;
    border-radius:50%;
    cursor:pointer;
}

.cart-remove button{
    background:#e74c3c;
    border:none;
    color:#fff;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
}

.summary{
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
    height:fit-content;
}

.summary h2{
    margin-bottom:20px;
}

.summary-total{
    display:flex;
    justify-content:space-between;
    font-size:20px;
    margin-bottom:30px;
}

.checkout-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#c6a86b,#e6c88d);
    color:#fff;
    font-size:16px;
    cursor:pointer;
    margin-bottom:15px;
}

.clear-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:30px;
    background:#333;
    color:#fff;
    cursor:pointer;
}

/* Toast Notification */

.toast{
    position:fixed;
    bottom:30px;
    right:30px;
    background:#1e1e1e;
    color:#fff;
    padding:15px 25px;
    border-radius:30px;
    opacity:0;
    transform:translateY(20px);
    transition:all 0.3s ease;
}

.toast.show{
    opacity:1;
    transform:translateY(0);
}

/* Responsive */

@media(max-width:900px){
    .cart-container{
        grid-template-columns:1fr;
    }
}

</style>

</head>
<body>

<header class="header">
    <div class="logo">HavenCraft</div>
    <nav>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>
</header>

<section class="cart-page">

    <h1 style="margin-bottom:40px;">Your Shopping Cart</h1>

    <div class="cart-container">

        <!-- Cart Items -->
        <div id="cart-items"></div>

        <!-- Summary -->
        <div class="summary">
            <h2>Order Summary</h2>

            <div class="summary-total">
                <span>Total</span>
                <span id="cart-total">0</span> ৳
            </div>

            <button class="checkout-btn" onclick="orderViaWhatsApp()">
                Order via WhatsApp
            </button>

            <button class="clear-btn" onclick="clearCart()">
                Clear Cart
            </button>

        </div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
